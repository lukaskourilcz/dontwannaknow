<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fafffa" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Don't wanna know · The world your people lived through</title>

    <meta
      name="description"
      content="Enter a birth year and birthplace and see the world your parents and grandparents lived through — bizarre, beautiful, and everyday details from 1920 to today."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Don't wanna know · The world your people lived through" />
    <meta
      property="og:description"
      content="Enter a birth year and birthplace and see the world your parents and grandparents lived through — bizarre, beautiful, and everyday details."
    />
    <meta property="og:locale" content="cs_CZ" />
    <meta property="og:locale:alternate" content="en_US" />
    <!-- Same-origin share card (does not affect the strict img-src 'self' CSP;
         social scrapers fetch the file, the app never requests a third party).
         PLACEHOLDER — replace public/og-image.png with real artwork. If your
         scraper needs an absolute URL, add <meta property="og:url"> with your
         domain and make these absolute. -->
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Don't wanna know — the world your people lived through" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Don't wanna know · The world your people lived through" />
    <meta
      name="twitter:description"
      content="See the bizarre, beautiful, and everyday world your parents and grandparents lived through."
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      This site needs JavaScript to compute the report. It runs entirely
      in your browser — nothing is sent anywhere.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
