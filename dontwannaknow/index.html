<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f2e8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Tehdejší svět — Čí svět chcete poznat?</title>

    <meta
      name="description"
      content="Poznejte svět, ve kterém vyrůstal člověk, na kterém vám záleží. Každodenní život, kultura a události z Česka a Ukrajiny, zpracované soukromě přímo ve vašem prohlížeči."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tehdejší svět — Čí svět chcete poznat?" />
    <meta
      property="og:description"
      content="Poznejte svět, ve kterém vyrůstal člověk, na kterém vám záleží. Každodenní život, kultura a události z Česka a Ukrajiny."
    />
    <meta property="og:locale" content="cs_CZ" />
    <!-- Same-origin share card. Add the production origin after the final
         domain is configured so social scrapers receive an absolute URL. -->
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Tehdejší svět — osobní obraz dětství a dospívání" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tehdejší svět — Čí svět chcete poznat?" />
    <meta
      name="twitter:description"
      content="Poznejte každodenní život, kulturu a události, které obklopovaly člověka během dětství a dospívání."
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Tehdejší svět potřebuje JavaScript, protože zprávu skládá přímo ve vašem
      prohlížeči. Údaje z formuláře se neposílají na server.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
